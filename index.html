<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
    height:100vh;
    background:radial-gradient(circle at top,#0a0f2c,#02030a);
    color:white;
}

/* chat */
.chat{
    max-width:600px;
    margin:auto;
    height:100vh;
    display:flex;
    flex-direction:column;
}

/* header */
.header{
    display:flex;
    align-items:center;
    gap:10px;
    padding:15px;
    background:rgba(0,0,0,0.4);
}

.header img{
    width:40px;
    height:40px;
    border-radius:50%;
}

.header .name{
    font-weight:bold;
}

/* mensajes */
.messages{
    flex:1;
    overflow-y:auto;
    padding:15px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

/* mensaje */
.msg{
    display:flex;
    align-items:flex-end;
    gap:8px;
    max-width:80%;
}

.msg img{
    width:30px;
    height:30px;
    border-radius:50%;
}

/* burbujas */
.bubble{
    padding:10px 14px;
    border-radius:15px;
}

/* bot */
.bot{
    align-self:flex-start;
}
.bot .bubble{
    background:#111;
}

/* user */
.user{
    align-self:flex-end;
}
.user .bubble{
    background:linear-gradient(45deg,#00ffff,#ff00ff);
    color:black;
    font-weight:bold;
}

/* input */
.input-area{
    display:flex;
    padding:10px;
    background:rgba(0,0,0,0.5);
}

input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:20px;
    outline:none;
}

button{
    margin-left:10px;
    width:45px;
    height:45px;
    border:none;
    border-radius:50%;
    background:linear-gradient(45deg,#00ffff,#ff00ff);
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="chat">

<div class="header">
    <img src="bot.png">
    <div class="name">Ferrobloggers 🚆</div>
</div>

<div id="messages" class="messages"></div>

<div class="input-area">
    <input id="input" placeholder="Preguntá sobre trenes...">
    <button onclick="send()">➤</button>
</div>

</div>

<script>
let userName = localStorage.getItem("name");
const messages = document.getElementById("messages");

/* agregar mensaje */
function addMessage(text,type){
    const div = document.createElement("div");
    div.className = "msg " + type;

    if(type==="bot"){
        div.innerHTML = `
            <img src="bot.png">
            <div class="bubble">${text}</div>
        `;
    }else{
        div.innerHTML = `
            <div class="bubble">${text}</div>
        `;
    }

    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

/* enviar */
async function send(){
    const input = document.getElementById("input");
    const text = input.value.trim();
    if(!text) return;

    if(!userName){
        userName = text;
        localStorage.setItem("name", userName);
        addMessage(text,"user");
        addMessage(`Bienvenido ${userName} 🚆 preguntame sobre trenes argentinos`,"bot");
        input.value="";
        return;
    }

    addMessage(text,"user");
    input.value="";

    addMessage("Pensando...","bot");

    try{
        const res = await fetch("/api/chat",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({message:text,name:userName})
        });

        const data = await res.json();
        messages.lastChild.querySelector(".bubble").innerText = data.reply;

    }catch{
        messages.lastChild.querySelector(".bubble").innerText = "Error ⚠️";
    }
}

/* inicio */
if(!userName){
    addMessage("Hola 👋 ¿Cómo te llamás?","bot");
}else{
    addMessage(`Hola ${userName} 🚆`,"bot");
}

document.getElementById("input").addEventListener("keypress", e=>{
    if(e.key==="Enter") send();
});
</script>

</body>
</html>
