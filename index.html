<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ferrobloggers IA</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle at top, #001f3f, #000);
  color:white;
}

/* HEADER */
header{
  background:#0b0b0b;
  padding:15px;
  display:flex;
  align-items:center;
  gap:10px;
  box-shadow:0 0 15px #00ffff55;
}

.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  background:url("https://cdn-icons-png.flaticon.com/512/744/744465.png") center/cover;
}

.title{
  font-size:18px;
  font-weight:bold;
}

.status{
  font-size:12px;
  color:#00ffcc;
}

/* CHAT */
#chat{
  height:70vh;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

/* MENSAJES */
.msg{
  max-width:75%;
  padding:10px;
  margin:8px;
  border-radius:15px;
  animation:fade .3s;
}

.user{
  background:#0084ff;
  align-self:flex-end;
}

.bot{
  background:#111;
  border:1px solid #00ffff55;
}

@keyframes fade{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;}
}

/* INPUT */
#inputBox{
  display:flex;
  padding:10px;
  background:#0b0b0b;
}

#inputBox input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:20px;
  background:#111;
  color:white;
}

#inputBox button{
  margin-left:10px;
  padding:10px 15px;
  border:none;
  border-radius:20px;
  background:linear-gradient(45deg,#00ffff,#ff00ff);
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <div class="avatar"></div>
  <div>
    <div class="title">Ferrobloggers</div>
    <div class="status">● IA activa</div>
  </div>
</header>

<div id="chat"></div>

<div id="inputBox">
  <input id="msg" placeholder="Escribí sobre trenes...">
  <button onclick="send()">Enviar</button>
</div>

<script>

const chat = document.getElementById("chat");
let name = prompt("¿Tu nombre?") || "Usuario";

// agregar mensaje
function addMsg(text, cls){
  let d = document.createElement("div");
  d.className = "msg " + cls;
  d.innerText = text;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

// enviar
async function send(){
  let input = document.getElementById("msg");
  let text = input.value;
  if(!text) return;

  addMsg(text,"user");
  input.value = "";

  try{
    let res = await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        message:text,
        name:name
      })
    });

    let data = await res.json();

    addMsg(data.reply || "No entendí, ¿me explicás de nuevo? 🇦🇷","bot");

  }catch{
    addMsg("Error ⚠️","bot");
  }
}

// enter
document.getElementById("msg").addEventListener("keypress",e=>{
  if(e.key==="Enter") send();
});

</script>

</body>
</html>
