<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
    height:100vh;
    background:linear-gradient(135deg,#0a0f2c,#02030a);
    color:white;
}

/* contenedor */
.chat{
    max-width:600px;
    margin:auto;
    height:100vh;
    display:flex;
    flex-direction:column;
}

/* header */
.header{
    padding:15px;
    text-align:center;
    font-weight:bold;
    font-size:18px;
    background:#111;
}

/* mensajes */
.messages{
    flex:1;
    padding:15px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:10px;
}

/* burbujas */
.msg{
    max-width:75%;
    padding:10px 14px;
    border-radius:15px;
    animation:fade .2s ease;
}

.bot{
    background:#222;
    align-self:flex-start;
}

.user{
    background:#00c6ff;
    color:black;
    align-self:flex-end;
}

@keyframes fade{
    from{opacity:0;transform:translateY(5px);}
    to{opacity:1;}
}

/* input */
.input-area{
    display:flex;
    padding:10px;
    background:#111;
}

input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:20px;
}

button{
    margin-left:10px;
    padding:0 18px;
    border:none;
    border-radius:20px;
    background:#00c6ff;
    color:black;
    font-weight:bold;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="chat">

<div class="header">🚆 Ferrobloggers</div>

<div id="messages" class="messages"></div>

<div class="input-area">
    <input id="input" placeholder="Preguntá sobre trenes argentinos...">
    <button onclick="send()">Enviar</button>
</div>

</div>

<script>
let name = localStorage.getItem("name");

function add(text,type){
    const div = document.createElement("div");
    div.className="msg "+type;
    div.innerText=text;
    messages.appendChild(div);
    messages.scrollTop=messages.scrollHeight;
}

async function send(){
    const input=document.getElementById("input");
    const msg=input.value.trim();
    if(!msg) return;

    if(!name){
        name=msg;
        localStorage.setItem("name",name);
        add(msg,"user");
        add("Listo 🚆 ahora preguntame sobre trenes","bot");
        input.value="";
        return;
    }

    add(msg,"user");
    input.value="";
    add("Pensando...","bot");

    const res=await fetch("/api/chat",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({message:msg,name:name})
    });

    const data=await res.json();
    messages.lastChild.innerText=data.reply;
}

if(!name){
    add("Hola 👋 ¿Tu nombre?","bot");
}else{
    add("Hola "+name+" 🚆","bot");
}
</script>

</body>
</html>
