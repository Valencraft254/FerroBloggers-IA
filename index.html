<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ferrobloggers</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial, sans-serif;}

:root{
  --bg:#0b0f1a;
  --panel:#121826;
  --accent:#22c1ff;
  --accent2:#9b5cff;
  --bubble-user:#dcf8c6;
  --bubble-bot:#1f2937;
  --text:#e5e7eb;
  --muted:#9ca3af;
}

body{
  height:100vh;
  background:
    radial-gradient(1200px 600px at 10% -10%, rgba(34,193,255,.15), transparent 60%),
    radial-gradient(1200px 600px at 110% 10%, rgba(155,92,255,.15), transparent 60%),
    var(--bg);
  color:var(--text);
}

/* contenedor app */
.app{
  max-width:680px;
  height:100vh;
  margin:auto;
  display:flex;
  flex-direction:column;
  border-left:1px solid rgba(255,255,255,.05);
  border-right:1px solid rgba(255,255,255,.05);
  background:linear-gradient(180deg, rgba(18,24,38,.85), rgba(11,15,26,.95));
  backdrop-filter: blur(8px);
}

/* header tipo WhatsApp */
.header{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px 14px;
  background:var(--panel);
  border-bottom:1px solid rgba(255,255,255,.05);
}

.header img{
  width:42px;height:42px;border-radius:50%;
  box-shadow:0 0 0 2px rgba(34,193,255,.4);
}

.header .meta{
  display:flex;flex-direction:column;
}
.header .name{
  font-weight:bold;
}
.header .status{
  font-size:12px;color:var(--muted);
}

/* zona mensajes */
.messages{
  flex:1;
  overflow-y:auto;
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* fila mensaje */
.row{
  display:flex;
  gap:8px;
  align-items:flex-end;
}

.row.user{ justify-content:flex-end; }
.row.bot{ justify-content:flex-start; }

/* avatar en mensajes del bot */
.avatar{
  width:28px;height:28px;border-radius:50%;
  flex:0 0 auto;
  opacity:.9;
}

/* burbujas */
.bubble{
  max-width:78%;
  padding:10px 12px;
  border-radius:16px;
  position:relative;
  line-height:1.3;
  box-shadow:0 6px 18px rgba(0,0,0,.25);
  animation:fade .15s ease;
}

.user .bubble{
  background:var(--bubble-user);
  color:#111;
  border-bottom-right-radius:6px;
}

.bot .bubble{
  background:var(--bubble-bot);
  border-bottom-left-radius:6px;
}

/* hora + ticks */
.meta-msg{
  display:flex;
  align-items:center;
  gap:6px;
  font-size:11px;
  color:var(--muted);
  margin-top:4px;
  justify-content:flex-end;
}
.bot .meta-msg{ justify-content:flex-start; }

.ticks{
  font-size:12px;
}

/* input */
.input-area{
  display:flex;
  gap:8px;
  padding:10px;
  background:var(--panel);
  border-top:1px solid rgba(255,255,255,.05);
}

.input-wrap{
  flex:1;
  display:flex;
  align-items:center;
  gap:8px;
  background:#0f172a;
  border-radius:999px;
  padding:8px 12px;
}

input{
  flex:1;
  background:transparent;
  border:none;
  outline:none;
  color:var(--text);
}

button{
  border:none;
  border-radius:999px;
  padding:10px 14px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:white;
  font-weight:bold;
  cursor:pointer;
}

/* typing */
.typing{
  display:inline-block;
}
.typing span{
  display:inline-block;
  width:6px;height:6px;border-radius:50%;
  background:#cbd5f5;margin-right:3px;
  animation:blink 1.2s infinite;
}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}

@keyframes blink{
  0%,80%,100%{opacity:.2}
  40%{opacity:1}
}

@keyframes fade{
  from{opacity:0;transform:translateY(4px)}
  to{opacity:1}
}
</style>
</head>

<body>

<div class="app">

  <div class="header">
    <img src="bot.png" alt="bot">
    <div class="meta">
      <div class="name">Ferrobloggers 🚆</div>
      <div id="status" class="status">en línea</div>
    </div>
  </div>

  <div id="messages" class="messages"></div>

  <div class="input-area">
    <div class="input-wrap">
      <input id="input" placeholder="Escribí sobre trenes argentinos...">
    </div>
    <button onclick="send()">Enviar</button>
  </div>

</div>

<script>
const messages = document.getElementById("messages");
const statusEl = document.getElementById("status");
let name = localStorage.getItem("name");

/* hora */
function nowTime(){
  const d = new Date();
  return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

/* agregar mensaje */
function addMessage(text, type, opts={}){
  const row = document.createElement("div");
  row.className = "row " + type;

  if(type === "bot"){
    const avatar = document.createElement("img");
    avatar.src = "bot.png";
    avatar.className = "avatar";
    row.appendChild(avatar);
  }

  const wrap = document.createElement("div");

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerHTML = text;

  const meta = document.createElement("div");
  meta.className = "meta-msg";
  meta.innerHTML = `
    <span>${nowTime()}</span>
    ${type==="user" ? '<span class="ticks">✓✓</span>' : ''}
  `;

  wrap.appendChild(bubble);
  wrap.appendChild(meta);

  row.appendChild(wrap);
  messages.appendChild(row);
  messages.scrollTop = messages.scrollHeight;

  return bubble;
}

/* typing indicador */
let typingBubble = null;
function showTyping(){
  statusEl.textContent = "escribiendo…";
  typingBubble = addMessage(
    '<span class="typing"><span></span><span></span><span></span></span>',
    "bot"
  );
}
function hideTyping(){
  statusEl.textContent = "en línea";
  if(typingBubble){
    typingBubble.parentElement.parentElement.remove();
    typingBubble = null;
  }
}

/* enviar */
async function send(){
  const input = document.getElementById("input");
  const text = input.value.trim();
  if(!text) return;

  if(!name){
    name = text;
    localStorage.setItem("name", name);
    addMessage(text, "user");
    addMessage(`Bienvenido ${name} 🚆 Preguntame sobre trenes argentinos`, "bot");
    input.value="";
    return;
  }

  addMessage(text, "user");
  input.value="";

  showTyping();

  try{
    const res = await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({message:text, name})
    });

    const data = await res.json();

    hideTyping();
    addMessage(data.reply, "bot");

  }catch{
    hideTyping();
    addMessage("Error ⚠️", "bot");
  }
}

/* enter */
document.getElementById("input").addEventListener("keypress", e=>{
  if(e.key==="Enter") send();
});

/* inicio */
if(!name){
  addMessage("Hola 👋 ¿Cómo te llamás?", "bot");
}else{
  addMessage(`Hola ${name} 🚆`, "bot");
}
<div class="card">
  <h2>🚆 Información oficial</h2>
  <div id="links"></div>
</div>

<script>
const fuentes = [
  {nombre:"NCA",url:"https://nca.com.ar/"},
  {nombre:"CNRT Cargas",url:"https://www.argentina.gob.ar/transporte/cnrt/lineas-de-trenes-cargas"},
  {nombre:"Trenes Argentinos Cargas",url:"https://www.argentina.gob.ar/transporte/trenes-argentinos-cargas"},
  {nombre:"Ferroexpreso Pampeano",url:"https://www.scp.com.ar/ferroexpreso-pampeano.php"},
  {nombre:"Buenos Aires - Rosario",url:"https://www.argentina.gob.ar/transporte/trenes-argentinos/horarios-tarifas-y-recorridos/servicios-regionales-larga-distancia/buenosaires-rosario"},
  {nombre:"Línea Mitre",url:"https://es.wikipedia.org/wiki/L%C3%ADnea_Mitre"},
  {nombre:"Pasajes Larga Distancia",url:"https://www.argentina.gob.ar/transporte/trenes-argentinos/pasajes-larga-distancia"}
];

const container = document.getElementById("links");

fuentes.forEach(f => {
  const a = document.createElement("a");
  a.href = f.url;
  a.target = "_blank";
  a.innerText = "🔗 " + f.nombre;
  a.style.display = "block";
  a.style.margin = "10px 0";
  container.appendChild(a);
});
</script>

</body>
</html>
