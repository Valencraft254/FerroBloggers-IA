<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
    background:linear-gradient(135deg,#000,#020024,#001f3f,#000);
    background-size:400% 400%;
    animation:galaxy 15s ease infinite;
    height:100vh;
    display:flex;
}

@keyframes galaxy{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.chat{
    width:100%;
    max-width:600px;
    margin:auto;
    height:100vh;
    display:flex;
    flex-direction:column;
}

#messages{
    flex:1;
    overflow-y:auto;
    padding:15px;
}

.msg{
    margin:12px 0;
    display:flex;
    flex-direction:column;
}

.name{
    font-size:12px;
    color:#aaa;
    margin-bottom:4px;
}

.text{
    padding:12px;
    border-radius:12px;
    background:#111;
    color:white;
    max-width:70%;
}

.user{
    align-items:flex-end;
}

.user .text{
    background:#002244;
}

.bot .name{
    color:#00ffff;
}

.input-area{
    display:flex;
    padding:10px;
    background:#000;
}

input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#111;
    color:white;
}

button{
    margin-left:10px;
    padding:12px 18px;
    border:none;
    border-radius:10px;
    background:linear-gradient(45deg,#00ffff,#ff00ff);
    font-weight:bold;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="chat">
    <div id="messages"></div>

    <div class="input-area">
        <input id="input" placeholder="Escribí...">
        <button onclick="send()">➤</button>
    </div>
</div>

<script>
const messages = document.getElementById("messages");

function addMessage(text, type){
    const div = document.createElement("div");
    div.className = "msg " + type;

    if(type==="bot"){
        div.innerHTML = `
            <div class="name">FerroBloggers</div>
            <div class="text">${text}</div>
        `;
    }else{
        div.innerHTML = `
            <div class="name">Tú</div>
            <div class="text">${text}</div>
        `;
    }

    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

async function send(){
    const input = document.getElementById("input");
    const text = input.value.trim();
    if(!text) return;

    addMessage(text,"user");
    input.value="";

    const loadingMsg = document.createElement("div");
    loadingMsg.className = "msg bot";
    loadingMsg.innerHTML = `
        <div class="name">FerroBloggers</div>
        <div class="text">Pensando...</div>
    `;
    messages.appendChild(loadingMsg);
    messages.scrollTop = messages.scrollHeight;

    try{
        const res = await fetch("/api/chat",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({message:text})
        });

        const data = await res.json();

        let reply = data.reply;

        if(!reply || reply.trim() === ""){
            reply = "No pude responder eso 🚆";
        }

        loadingMsg.querySelector(".text").innerText = reply;

    }catch(error){
        loadingMsg.querySelector(".text").innerText = "Error de conexión ⚠️";
    }
}

document.getElementById("input").addEventListener("keypress", e=>{
    if(e.key==="Enter") send();
});

// mensaje inicial
addMessage("Hola 👋 Soy FerroBloggers 🚆","bot");
</script>

</body>
</html>
