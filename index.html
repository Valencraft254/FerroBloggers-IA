<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ferrobloggers</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#000,#0a0a0a,#001f3f);
  color:white;
}

/* header */
header{
  text-align:center;
  padding:15px;
  font-size:22px;
  background:#111;
  box-shadow:0 0 15px #00ffff;
}

/* chat */
#chat{
  height:60vh;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

.msg{
  max-width:75%;
  padding:10px;
  margin:8px;
  border-radius:15px;
  animation:fade .3s;
}

.user{
  background:#0084ff;
  align-self:flex-end;
}

.bot{
  background:#222;
  border:1px solid #00ffff55;
}

@keyframes fade{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}

/* input */
#inputBox{
  display:flex;
  padding:10px;
  background:#111;
}

#inputBox input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:20px;
  background:#222;
  color:white;
}

#inputBox button{
  margin-left:10px;
  padding:10px;
  border:none;
  background:linear-gradient(45deg,#00ffff,#ff00ff);
  border-radius:20px;
  cursor:pointer;
}

/* buscador */
#search{
  padding:10px;
}

#search input{
  width:100%;
  padding:10px;
  border-radius:20px;
  border:none;
  background:#111;
  color:white;
}

.result{
  background:#111;
  margin:5px 0;
  padding:10px;
  border-radius:10px;
}
a{color:#00ffff}
</style>

</head>
<body>

<header>🚆 Ferrobloggers IA</header>

<!-- 🔎 buscador -->
<div id="search">
  <input id="searchInput" placeholder="Buscar páginas de trenes...">
  <div id="results"></div>
</div>

<!-- 💬 chat -->
<div id="chat"></div>

<div id="inputBox">
  <input id="msg" placeholder="Preguntá sobre trenes...">
  <button onclick="send()">Enviar</button>
</div>

<script>

// 🧠 BASE DE CONOCIMIENTO
const info = {
  ferrosur: "Ferrosur Roca es una empresa de carga que opera sobre vías del Ferrocarril Roca, incluyendo zona de Puerto Madero.",
  nca: "Nuevo Central Argentino opera trenes de carga en el centro del país, conectando Rosario, Córdoba y Buenos Aires.",
  roca: "La línea Roca conecta Constitución con La Plata, Ezeiza y Bosques.",
  mitre: "La línea Mitre conecta Retiro con Tigre, Suárez y Bartolomé Mitre.",
  sarmiento: "La línea Sarmiento conecta Once con Moreno.",
  sanmartin: "La línea San Martín conecta Retiro con Pilar."
};

// 🔎 fuentes
const fuentes = [
  {nombre:"NCA",url:"https://nca.com.ar/"},
  {nombre:"Ferrosur Roca",url:"https://www.argentina.gob.ar/transporte/cnrt/lineas-de-trenes-cargas"},
  {nombre:"Trenes Argentinos",url:"https://www.argentina.gob.ar/transporte/trenes-argentinos"}
];

// 🔎 buscador
document.getElementById("searchInput").addEventListener("input", e=>{
  let q = e.target.value.toLowerCase();
  let container = document.getElementById("results");
  container.innerHTML = "";

  fuentes.forEach(f=>{
    if(f.nombre.toLowerCase().includes(q)){
      container.innerHTML += `
        <div class="result">
          ${f.nombre}<br>
          <a href="${f.url}" target="_blank">Abrir</a>
        </div>
      `;
    }
  });
});

// 💬 chat
const chat = document.getElementById("chat");
let name = prompt("¿Tu nombre?") || "Usuario";

function addMsg(t, c){
  let d = document.createElement("div");
  d.className = "msg " + c;
  d.innerText = t;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

// 🧠 detección inteligente
function detectar(text){
  text = text.toLowerCase();

  if(text.includes("hola")) return "Hola " + name + " 👋 ¿qué querés saber de trenes?";

  if(text.includes("gracias")) return "De nada 🚆";

  for(let k in info){
    if(text.includes(k)) return info[k];
  }

  // detectar parecido
  if(text.includes("carga") || text.includes("mercaderia"))
    return "Los trenes de carga en Argentina incluyen NCA, Ferrosur y Ferroexpreso Pampeano.";

  if(text.includes("puerto madero"))
    return "En Puerto Madero pasan trenes de carga que usan vías del Roca, como Ferrosur.";

  return null;
}

async function send(){
  let input = document.getElementById("msg");
  let text = input.value;
  if(!text) return;

  addMsg(text,"user");
  input.value = "";

  let local = detectar(text);

  if(local){
    addMsg(local + "\n\n¿Cualquier duda decime? 🚆","bot");
    return;
  }

  try{
    let res = await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text,name:name})
    });

    let data = await res.json();
    addMsg(data.reply || "No entendí, ¿me explicás de nuevo? 🇦🇷","bot");

  }catch{
    addMsg("Error ⚠️","bot");
  }
}

// enter
document.getElementById("msg").addEventListener("keypress",e=>{
  if(e.key==="Enter") send();
});

</script>

</body>
</html>
