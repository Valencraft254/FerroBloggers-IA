<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b141a;
}

/* chat */
.chat{
    max-width:600px;
    margin:auto;
    height:100vh;
    display:flex;
    flex-direction:column;
}

/* header tipo whatsapp */
.header{
    background:#202c33;
    color:white;
    padding:12px;
    font-weight:bold;
    display:flex;
    align-items:center;
    gap:10px;
}

.header img{
    width:35px;
    height:35px;
    border-radius:50%;
}

/* mensajes */
#messages{
    flex:1;
    padding:10px;
    overflow-y:auto;
    background:#111b21;
}

.msg{
    display:flex;
    margin:8px 0;
}

.msg.bot{
    justify-content:flex-start;
}

.msg.user{
    justify-content:flex-end;
}

.bubble{
    padding:10px 14px;
    border-radius:10px;
    max-width:75%;
    font-size:14px;
}

.bot .bubble{
    background:#202c33;
    color:white;
}

.user .bubble{
    background:#005c4b;
    color:white;
}

/* input */
.input-area{
    display:flex;
    padding:10px;
    background:#202c33;
}

input{
    flex:1;
    padding:10px;
    border:none;
    border-radius:20px;
    background:#2a3942;
    color:white;
}

button{
    margin-left:10px;
    border:none;
    border-radius:50%;
    width:45px;
    height:45px;
    background:#00a884;
    color:white;
    font-size:18px;
}
</style>
</head>

<body>

<div class="chat">

<div class="header">
    <img src="bot.png">
    FerroBloggers 🚆
</div>

<div id="messages"></div>

<div class="input-area">
    <input id="input" placeholder="Mensaje">
    <button onclick="send()">➤</button>
</div>

</div>

<script>
let userName = localStorage.getItem("name");
const messages = document.getElementById("messages");

function addMessage(text,type){
    const div = document.createElement("div");
    div.className = "msg " + type;

    div.innerHTML = `<div class="bubble">${text}</div>`;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

async function send(){
    const input = document.getElementById("input");
    const text = input.value.trim();
    if(!text) return;

    if(!userName){
        userName = text;
        localStorage.setItem("name", userName);
        addMessage(text,"user");
        addMessage(`Listo ${userName} 🚆 preguntame sobre trenes argentinos`,"bot");
        input.value="";
        return;
    }

    addMessage(text,"user");
    input.value="";

    const loading = addLoading();

    try{
        const res = await fetch("/api/chat",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({message:text, name:userName})
        });

        const data = await res.json();
        loading.innerText = data.reply;

    }catch{
        loading.innerText = "Error ⚠️";
    }
}

function addLoading(){
    const div = document.createElement("div");
    div.className = "msg bot";
    div.innerHTML = `<div class="bubble">...</div>`;
    messages.appendChild(div);
    return div.querySelector(".bubble");
}

if(!userName){
    addMessage("Hola 👋 ¿Cómo te llamás?","bot");
}else{
    addMessage(`Hola ${userName} 🚆`,"bot");
}
</script>

</body>
</html>
