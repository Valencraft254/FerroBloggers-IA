<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
    height:100vh;
    background:radial-gradient(circle at top,#0a0f2c,#02030a);
    overflow:hidden;
}

/* 🌌 partículas fondo */
body::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:radial-gradient(white 1px, transparent 1px);
    background-size:40px 40px;
    opacity:0.08;
    animation:moveStars 60s linear infinite;
}

@keyframes moveStars{
    from{transform:translate(0,0);}
    to{transform:translate(-200px,-200px);}
}

/* 📱 contenedor */
.chat{
    position:relative;
    max-width:600px;
    margin:auto;
    height:100vh;
    display:flex;
    flex-direction:column;
    backdrop-filter:blur(20px);
}

/* 🔝 header */
.header{
    display:flex;
    align-items:center;
    gap:10px;
    padding:15px;
    background:rgba(0,0,0,0.4);
    border-bottom:1px solid rgba(255,255,255,0.05);
}

.header img{
    width:45px;
    height:45px;
    border-radius:50%;
    box-shadow:0 0 15px #00ffff;
}

.title{
    color:white;
    font-size:16px;
}

.status{
    font-size:12px;
    color:#00ffcc;
}

/* 💬 mensajes */
#messages{
    flex:1;
    padding:15px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:10px;
}

/* mensaje */
.msg{
    display:flex;
    max-width:75%;
    animation:fadeIn 0.25s ease;
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(10px);}
    to{opacity:1;transform:translateY(0);}
}

/* burbujas */
.bubble{
    padding:12px 16px;
    border-radius:16px;
    font-size:14px;
    line-height:1.4;
    backdrop-filter:blur(10px);
}

/* bot */
.bot{
    align-self:flex-start;
}
.bot .bubble{
    background:rgba(255,255,255,0.08);
    color:#fff;
    border:1px solid rgba(255,255,255,0.1);
}

/* usuario */
.user{
    align-self:flex-end;
}
.user .bubble{
    background:linear-gradient(135deg,#00ffff,#8a2be2);
    color:#000;
    font-weight:bold;
}

/* ✍ input */
.input-area{
    display:flex;
    padding:12px;
    gap:10px;
    background:rgba(0,0,0,0.5);
}

input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:30px;
    background:rgba(255,255,255,0.1);
    color:white;
    outline:none;
}

/* botón */
button{
    width:50px;
    height:50px;
    border:none;
    border-radius:50%;
    background:linear-gradient(45deg,#00ffff,#ff00ff);
    color:white;
    font-size:18px;
    cursor:pointer;
    box-shadow:0 0 15px #00ffff;
}

/* scroll */
#messages::-webkit-scrollbar{
    width:6px;
}
#messages::-webkit-scrollbar-thumb{
    background:#444;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="chat">

<div class="header">
    <img src="bot.png">
    <div>
        <div class="title">FerroBloggers 🚆</div>
        <div class="status">IA de trenes argentinos</div>
    </div>
</div>

<div id="messages"></div>

<div class="input-area">
    <input id="input" placeholder="Escribí sobre trenes...">
    <button onclick="send()">➤</button>
</div>

</div>

<script>
let userName = localStorage.getItem("name");
const messages = document.getElementById("messages");

function addMessage(text,type){
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerHTML = `<div class="bubble">${text}</div>`;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

async function send(){
    const input = document.getElementById("input");
    const text = input.value.trim();
    if(!text) return;

    if(!userName){
        userName = text;
        localStorage.setItem("name", userName);
        addMessage(text,"user");
        addMessage(`Bienvenido ${userName} 🚆 preguntame lo que quieras de trenes argentinos`,"bot");
        input.value="";
        return;
    }

    addMessage(text,"user");
    input.value="";

    const loading = addLoading();

    try{
        const res = await fetch("/api/chat",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({message:text,name:userName})
        });

        const data = await res.json();
        loading.innerText = data.reply;

    }catch{
        loading.innerText = "Error ⚠️";
    }
}

function addLoading(){
    const div = document.createElement("div");
    div.className = "msg bot";
    div.innerHTML = `<div class="bubble">Pensando...</div>`;
    messages.appendChild(div);
    return div.querySelector(".bubble");
}

/* inicio */
if(!userName){
    addMessage("Hola 👋 ¿Cómo te llamás?","bot");
}else{
    addMessage(`Hola ${userName} 🚆`,"bot");
}

document.getElementById("input").addEventListener("keypress", e=>{
    if(e.key==="Enter") send();
});
</script>

</body>
</html>
