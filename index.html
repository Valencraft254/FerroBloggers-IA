<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
    background:#0b141a;
    height:100vh;
}

/* contenedor */
.chat{
    max-width:600px;
    margin:auto;
    height:100vh;
    display:flex;
    flex-direction:column;
    border-radius:10px;
    overflow:hidden;
}

/* header */
.header{
    background:#202c33;
    padding:12px;
    display:flex;
    align-items:center;
    gap:10px;
    color:white;
    box-shadow:0 2px 10px rgba(0,0,0,.5);
}

.header img{
    width:40px;
    height:40px;
    border-radius:50%;
}

.status{
    font-size:12px;
    color:#00d4ff;
}

/* mensajes */
#messages{
    flex:1;
    padding:15px;
    overflow-y:auto;
    background:radial-gradient(circle at top,#0f2027,#0b141a);
}

/* mensaje */
.msg{
    display:flex;
    margin:10px 0;
    animation:fade .2s ease;
}

@keyframes fade{
    from{opacity:0;transform:translateY(10px);}
    to{opacity:1;transform:translateY(0);}
}

.msg.bot{justify-content:flex-start;}
.msg.user{justify-content:flex-end;}

/* burbujas */
.bubble{
    padding:10px 14px;
    border-radius:12px;
    max-width:75%;
    font-size:14px;
    line-height:1.4;
}

/* bot */
.bot .bubble{
    background:#202c33;
    color:white;
    box-shadow:0 0 10px rgba(0,255,255,.2);
}

/* usuario */
.user .bubble{
    background:linear-gradient(135deg,#005c4b,#008069);
    color:white;
    box-shadow:0 0 10px rgba(0,255,150,.3);
}

/* input */
.input-area{
    display:flex;
    padding:10px;
    background:#202c33;
}

input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:25px;
    background:#2a3942;
    color:white;
    outline:none;
}

button{
    margin-left:10px;
    width:45px;
    height:45px;
    border:none;
    border-radius:50%;
    background:linear-gradient(45deg,#00ffff,#00ff99);
    color:black;
    font-size:18px;
    cursor:pointer;
}

/* scroll */
#messages::-webkit-scrollbar{
    width:6px;
}
#messages::-webkit-scrollbar-thumb{
    background:#333;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="chat">

<!-- HEADER -->
<div class="header">
    <img src="bot.png">
    <div>
        <div>FerroBloggers 🚆</div>
        <div class="status">online</div>
    </div>
</div>

<!-- MENSAJES -->
<div id="messages"></div>

<!-- INPUT -->
<div class="input-area">
    <input id="input" placeholder="Escribí un mensaje...">
    <button onclick="send()">➤</button>
</div>

</div>

<script>
let userName = localStorage.getItem("name");
const messages = document.getElementById("messages");

function addMessage(text,type){
    const div = document.createElement("div");
    div.className = "msg " + type;

    div.innerHTML = `<div class="bubble">${text}</div>`;
    messages.appendChild(div);

    messages.scrollTop = messages.scrollHeight;
}

async function send(){
    const input = document.getElementById("input");
    const text = input.value.trim();
    if(!text) return;

    if(!userName){
        userName = text;
        localStorage.setItem("name", userName);
        addMessage(text,"user");
        addMessage(`Listo ${userName} 🚆 preguntame sobre trenes argentinos`,"bot");
        input.value="";
        return;
    }

    addMessage(text,"user");
    input.value="";

    const loading = addLoading();

    try{
        const res = await fetch("/api/chat",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({
                message:text,
                name:userName
            })
        });

        const data = await res.json();
        loading.innerText = data.reply;

    }catch{
        loading.innerText = "Error ⚠️";
    }
}

function addLoading(){
    const div = document.createElement("div");
    div.className = "msg bot";
    div.innerHTML = `<div class="bubble">Escribiendo...</div>`;
    messages.appendChild(div);
    return div.querySelector(".bubble");
}

// inicio
if(!userName){
    addMessage("Hola 👋 ¿Cómo te llamás?","bot");
}else{
    addMessage(`Hola ${userName} 🚆`,"bot");
}

// enter
document.getElementById("input").addEventListener("keypress", e=>{
    if(e.key==="Enter") send();
});
</script>

</body>
</html>
