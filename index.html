<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
    background:linear-gradient(135deg,#000,#020024,#001f3f,#000);
    background-size:400% 400%;
    animation:galaxy 15s ease infinite;
    height:100vh;
    display:flex;
}

@keyframes galaxy{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.chat{
    width:100%;
    max-width:600px;
    margin:auto;
    height:100vh;
    display:flex;
    flex-direction:column;
    backdrop-filter:blur(10px);
}

#messages{
    flex:1;
    overflow-y:auto;
    padding:15px;
}

.msg{
    display:flex;
    margin:10px 0;
}

.bot img{
    width:38px;
    height:38px;
    margin-right:10px;
}

.text{
    padding:12px;
    border-radius:12px;
    background:#111;
    color:white;
    max-width:70%;
    box-shadow:0 0 10px rgba(0,255,255,.3);
}

.user{
    justify-content:flex-end;
}

.user .text{
    background:#002244;
    box-shadow:0 0 10px rgba(255,0,255,.3);
}

.input-area{
    display:flex;
    padding:10px;
    background:rgba(0,0,0,0.7);
}

input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#111;
    color:white;
    outline:none;
}

button{
    margin-left:10px;
    padding:12px 18px;
    border:none;
    border-radius:10px;
    background:linear-gradient(45deg,#00ffff,#ff00ff);
    cursor:pointer;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="chat">

<div id="messages"></div>

<div class="input-area">
    <input id="input" placeholder="Escribí...">
    <button onclick="send()">➤</button>
</div>

</div>

<script>
const messages = document.getElementById("messages");

function addMessage(text,type){
    const div = document.createElement("div");
    div.className = "msg " + type;

    if(type==="bot"){
        div.innerHTML = `
            <img src="boticon.png">
            <div class="text">${text}</div>
        `;
    }else{
        div.innerHTML = `<div class="text">${text}</div>`;
    }

    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

function send(){
    const input = document.getElementById("input");
    const text = input.value.trim();
    if(!text) return;

    addMessage(text,"user");
    input.value="";

    setTimeout(()=>{
        addMessage(responder(text),"bot");
    },400);
}

function responder(msg){
    msg = msg.toLowerCase();

    if(msg.includes("hola")) return "Hola 👋";
    if(msg.includes("tren")) return "Puedo darte info de trenes 🚆";
    if(msg.includes("roca")) return "Línea Roca → Constitución - La Plata";
    if(msg.includes("mitre")) return "Línea Mitre → Tigre / Suárez";
    if(msg.includes("sarmiento")) return "Sarmiento → Once - Moreno";

    return "No entendí 🤖";
}

document.getElementById("input").addEventListener("keypress",e=>{
    if(e.key==="Enter") send();
});

/* mensaje inicial */
addMessage("👋","bot");
</script>

</body>
  </html>
