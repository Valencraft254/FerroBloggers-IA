<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
    background:linear-gradient(135deg,#000,#020024,#001f3f,#000);
    background-size:400% 400%;
    animation:galaxy 15s ease infinite;
    height:100vh;
    display:flex;
}

@keyframes galaxy{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.chat{
    width:100%;
    max-width:600px;
    margin:auto;
    height:100vh;
    display:flex;
    flex-direction:column;
}

#messages{
    flex:1;
    overflow-y:auto;
    padding:15px;
}

.msg{
    display:flex;
    margin:10px 0;
    align-items:flex-end;
}

.msg.bot{
    flex-direction:row;
}

.msg.user{
    justify-content:flex-end;
}

.avatar{
    width:40px;
    height:40px;
    border-radius:50%;
    margin-right:8px;
}

.bubble{
    padding:12px;
    border-radius:12px;
    max-width:70%;
    background:#111;
}

.user .bubble{
    background:#002244;
}

.name{
    font-size:11px;
    color:#00ffff;
    margin-bottom:3px;
}

.input-area{
    display:flex;
    padding:10px;
    background:#000;
}

input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#111;
    color:white;
}

button{
    margin-left:10px;
    padding:12px 18px;
    border:none;
    border-radius:10px;
    background:linear-gradient(45deg,#00ffff,#ff00ff);
}
</style>
</head>

<body>

<div class="chat">
    <div id="messages"></div>

    <div class="input-area">
        <input id="input" placeholder="Escribí...">
        <button onclick="send()">➤</button>
    </div>
</div>

<script>
let userName = localStorage.getItem("name");

const messages = document.getElementById("messages");

function addMessage(text,type){
    const div = document.createElement("div");
    div.className = "msg " + type;

    if(type==="bot"){
        div.innerHTML = `
            <img src="bot.png" class="avatar">
            <div>
                <div class="name">FerroBloggers</div>
                <div class="bubble">${text}</div>
            </div>
        `;
    }else{
        div.innerHTML = `
            <div>
                <div class="name">${userName || "Tú"}</div>
                <div class="bubble">${text}</div>
            </div>
        `;
    }

    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

async function send(){
    const input = document.getElementById("input");
    const text = input.value.trim();
    if(!text) return;

    // guardar nombre
    if(!userName){
        userName = text;
        localStorage.setItem("name", userName);
        addMessage(text,"user");
        addMessage(`Mucho gusto ${userName} 🚆 ¿Qué querés saber sobre trenes?`,"bot");
        input.value="";
        return;
    }

    addMessage(text,"user");
    input.value="";

    const loading = addLoading();

    try{
        const res = await fetch("/api/chat",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({
                message:text,
                name:userName
            })
        });

        const data = await res.json();
        loading.querySelector(".bubble").innerText = data.reply;

    }catch{
        loading.querySelector(".bubble").innerText = "Error ⚠️";
    }
}

function addLoading(){
    const div = document.createElement("div");
    div.className = "msg bot";
    div.innerHTML = `
        <img src="bot.png" class="avatar">
        <div>
            <div class="name">FerroBloggers</div>
            <div class="bubble">Pensando...</div>
        </div>
    `;
    messages.appendChild(div);
    return div;
}

// inicio
if(!userName){
    addMessage("Hola 👋 ¿Cómo te llamás?","bot");
}else{
    addMessage(`Hola ${userName} 🚆`,"bot");
}
</script>

</body>
</html>
