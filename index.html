<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ferrobloggers</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0a0a;
  color:white;
}

header{
  background:#111;
  padding:15px;
  text-align:center;
  font-size:22px;
  box-shadow:0 0 10px #00ffff;
}

#chat{
  height:60vh;
  overflow-y:auto;
  padding:15px;
}

.msg{
  max-width:75%;
  padding:10px;
  margin:10px;
  border-radius:10px;
}

.user{
  background:#0084ff;
  margin-left:auto;
}

.bot{
  background:#222;
}

#inputBox{
  display:flex;
  padding:10px;
  background:#111;
}

#inputBox input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
}

#inputBox button{
  margin-left:10px;
  padding:10px;
  border:none;
  background:#00ffff;
  border-radius:10px;
  cursor:pointer;
}

/* búsqueda */
#search{
  padding:15px;
}

#search input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
}

#results{
  margin-top:10px;
}
.result{
  background:#111;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
}
a{color:#00ffff}
</style>

</head>
<body>

<header>🚆 Ferrobloggers</header>

<!-- 🔎 BUSCADOR -->
<div id="search">
  <input type="text" id="searchInput" placeholder="Buscar info de trenes...">
  <div id="results"></div>
</div>

<!-- 💬 CHAT -->
<div id="chat"></div>

<div id="inputBox">
  <input id="msg" placeholder="Escribí algo...">
  <button onclick="send()">Enviar</button>
</div>

<script>

// 📚 FUENTES
const fuentes = [
  {nombre:"Nuevo Central Argentino", url:"https://nca.com.ar/"},
  {nombre:"CNRT Cargas", url:"https://www.argentina.gob.ar/transporte/cnrt/lineas-de-trenes-cargas"},
  {nombre:"Trenes Argentinos Cargas", url:"https://www.argentina.gob.ar/transporte/trenes-argentinos-cargas"},
  {nombre:"Ferroexpreso Pampeano", url:"https://www.scp.com.ar/ferroexpreso-pampeano.php"},
  {nombre:"Buenos Aires - Rosario", url:"https://www.argentina.gob.ar/transporte/trenes-argentinos/horarios-tarifas-y-recorridos/servicios-regionales-larga-distancia/buenosaires-rosario"},
  {nombre:"Línea Mitre", url:"https://es.wikipedia.org/wiki/L%C3%ADnea_Mitre"},
  {nombre:"Pasajes Larga Distancia", url:"https://www.argentina.gob.ar/transporte/trenes-argentinos/pasajes-larga-distancia"},
  {nombre:"Material rodante", url:"https://www.argentina.gob.ar/transporte/trenes-argentinos-cargas/material"},
  {nombre:"CNRT Pasajeros", url:"https://www.argentina.gob.ar/transporte/cnrt/lineas-de-trenes-pasajeros"}
];

// 🔎 BUSCADOR LOCAL + LINKS
document.getElementById("searchInput").addEventListener("input", e=>{
  const q = e.target.value.toLowerCase();
  const container = document.getElementById("results");
  container.innerHTML = "";

  if(q.length < 2) return;

  fuentes.forEach(f=>{
    if(f.nombre.toLowerCase().includes(q)){
      const div = document.createElement("div");
      div.className = "result";
      div.innerHTML = `
        <b>${f.nombre}</b><br>
        <a href="${f.url}" target="_blank">Abrir página</a>
      `;
      container.appendChild(div);
    }
  });
});

// 💬 CHAT
const chat = document.getElementById("chat");
let username = prompt("¿Tu nombre?") || "Valen";

function addMsg(text, cls){
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function send(){
  const input = document.getElementById("msg");
  const text = input.value;
  if(!text) return;

  addMsg(text, "user");
  input.value = "";

  try{
    const res = await fetch("/api/chat", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        message:text,
        name:username
      })
    });

    const data = await res.json();

    addMsg(data.reply || "No entendí, ¿me explicás de nuevo? 🇦🇷", "bot");

  }catch{
    addMsg("Error ⚠️", "bot");
  }
}

// enter
document.getElementById("msg").addEventListener("keypress", e=>{
  if(e.key === "Enter") send();
});

</script>

</body>
</html>
